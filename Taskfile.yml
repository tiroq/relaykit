version: "3"

tasks:
  fmt:
    desc: Format all Go source files
    cmds:
      - go fmt ./...

  fmt-check:
    desc: Check that all Go source files are gofmt-clean (non-mutating)
    cmds:
      - |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "The following files are not gofmt-clean:"
          echo "$unformatted"
          exit 1
        fi

  lint:
    desc: Run go vet
    cmds:
      - go vet ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./... -timeout 120s

  test-race:
    desc: Run all tests with race detector
    cmds:
      - go test -race ./... -timeout 120s

  guard-no-app-imports:
    desc: Fail if any Go source files reference chunkbridge or MAX-specific identifiers
    cmds:
      - |
        found=$(grep -R --include="*.go" \
          -e "github.com/tiroq/chunkbridge" \
          -e "MaxTransport" \
          -e "platform-api" \
          -e "peer_chat_id" \
          -e "/messages/poll" \
          pkg/ 2>/dev/null || true)
        if [ -n "$found" ]; then
          echo "ERROR: app-specific references found in relaykit:"
          echo "$found"
          exit 1
        fi
        echo "guard-no-app-imports: OK"

  check:
    desc: Run fmt-check, lint, test, test-race, and guard-no-app-imports
    deps:
      - fmt-check
      - lint
      - test
      - test-race
      - guard-no-app-imports
